      .text { font-family: Arial, sans-serif; font-size: 16px; fill: #222; }
      .small { font-family: Arial, sans-serif; font-size: 14px; fill: #222; }
      .line { stroke: #333; stroke-width: 2; fill: none; marker-end: url(#arrow); }
